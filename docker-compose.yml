services:

  postgres:
    image: postgres:16
    container_name: velib-postgres
    environment:
      POSTGRES_DB: velib
      POSTGRES_USER: velib_user
      POSTGRES_PASSWORD: velib_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


  minio:
    image: minio/minio
    container_name: velib-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data


  metabase:
    image: metabase/metabase
    container_name: velib-metabase
    ports:
      - "3000:3000"

  ingestion:
    build: ./ingestion
    env_file:
      - .env


volumes:

  postgres_data:
  minio_data: